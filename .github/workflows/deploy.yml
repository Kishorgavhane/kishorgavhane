name: 🚀 Deploy Portfolio to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:

  validate:
    name: ✅ Validate HTML
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔍 Check index.html exists
        run: |
          if [ ! -f "index.html" ]; then
            echo "❌ ERROR: index.html not found!"
            exit 1
          fi
          echo "✅ index.html found — $(wc -l < index.html) lines"

  build:
    name: 🔨 Build Portfolio
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 📁 Prepare deploy folder
        run: |
          mkdir -p _site
          cp index.html _site/
          [ -f "404.html" ]  && cp 404.html _site/  || true
          [ -d "css" ]       && cp -r css _site/     || true
          [ -d "js" ]        && cp -r js _site/      || true
          [ -d "assets" ]    && cp -r assets _site/  || true
          [ -d "resume" ]    && cp -r resume _site/  || true
          echo "=== _site contents ===" && ls -la _site/

      - name: ⚙️ Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: 🌐 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: ✅ Print Live URL
        run: |
          echo "🎉 Portfolio LIVE at: ${{ steps.deployment.outputs.page_url }}"
